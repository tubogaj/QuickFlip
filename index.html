<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuickFlip System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="tabs">
  <button onclick="showTab('goldTab')">Gold</button>
  <button onclick="showTab('loanTab')">Loans</button>
</div>

<!-- GOLD TAB -->
<div id="goldTab" class="tab active">
  <h1>Gold Calculator</h1>

  <input id="goldPrice" type="number" placeholder="Gold Price (24k)">
  <input id="weight" type="number" placeholder="Weight">
  <input id="askingPrice" type="number" placeholder="Total Asking Price">
  <input id="pricePerGramInput" type="number" placeholder="Price per gram">

  <select id="purity">
    <option value="0.999">24k</option>
    <option value="0.916">22k</option>
    <option value="0.875">21k</option>
    <option value="0.750">18k</option>
    <option value="0.585">14k</option>
  </select>

  <button id="calcBtn">Calculate</button>
  <button id="saveBtn">Save Deal</button>

  <div id="results"></div>
</div>

<!-- LOANS TAB -->
<div id="loanTab" class="tab">
  <h1>Loan System</h1>

  <h3>Borrower</h3>
  <input id="name" placeholder="Name">
  <input id="address" placeholder="Address">
  <input id="idType" placeholder="ID Type">
  <input id="idNumber" placeholder="ID Number">

  <h3>Loan</h3>
  <input id="principal" type="number" placeholder="Principal">

  <select id="loanTerm">
    <option>Weekly</option>
    <option>Bi-Monthly</option>
    <option>Monthly</option>
  </select>

  <button onclick="generateLoan()">Calculate Loan</button>
  <button onclick="saveLoan()">Save Loan</button>
  <button onclick="generatePDF()">Generate Loan Agreement</button>

  <div id="loanResult"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
