<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickFlip - Gold Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="header">
  <h1>QuickFlip</h1>
  <div class="live">Live Gold: <span id="livePrice">Loading...</span></div>
</div>

<div class="card">

<input id="weight" placeholder="Weight (grams)" type="number">
<input id="price" placeholder="Total Price (₱)" type="number">

<select id="karat">
  <option value="1">24K</option>
  <option value="0.916">22K</option>
  <option value="0.875">21K</option>
  <option value="0.75">18K</option>
</select>

<button onclick="analyze()">Analyze Deal</button>
<button class="secondary" onclick="saveDeal()">Save to Cloud ☁️</button>

</div>


<script src="script.js"></script>
</body>
</html>
