<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuickFlip_</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <div class="left">
    <h1 class="title">QuickFlip_</h1>

    <div class="tabs">
      <button onclick="showTab('gold')">Gold</button>
      <button onclick="showTab('loan')">Loans</button>
    </div>

    <!-- GOLD -->
    <div id="gold" class="tab active">
      <input id="goldPrice" placeholder="Gold Price (24k)" type="number">
      <input id="weight" placeholder="Weight (g)" type="number">
      <input id="askingPrice" placeholder="Total Asking Price" type="number">
      <input id="pricePerGramInput" placeholder="Price per gram" type="number">

<select id="purity">
  <option value="24K">24K</option>
  <option value="22K">22K</option>
  <option value="21K">21K</option>
  <option value="18K">18K</option>
  <option value="16K">16K</option>
  <option value="14K">14K</option>
</select>

      <button onclick="saveDeal()">Save Deal</button>

      <div id="results"></div>
    </div>

    <!-- LOANS -->
    <div id="loan" class="tab">
      <h3>Borrower</h3>
      <input id="name" placeholder="Name">
      <input id="address" placeholder="Address">
      <input id="idType" placeholder="ID Type">
      <input id="idNumber" placeholder="ID Number">

      <h3>Loan</h3>
      <input id="principal" placeholder="Principal" type="number">

      <select id="loanTerm">
        <option>Weekly</option>
        <option>Bi-Monthly</option>
        <option>Monthly</option>
      </select>

      <button onclick="saveLoan()">Save Loan</button>
      <button onclick="generatePDF()">Loan Agreement PDF</button>

      <div id="loanResult"></div>
    </div>
  </div>

  <!-- GOLD PANEL -->
  <div class="right" id="goldPanel">
    <iframe src="https://goldpricez.com/ph/gram"></iframe>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
