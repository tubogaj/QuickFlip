<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuickFlip Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <div class="left-panel">
    <h1>QuickFlip</h1>
    <p class="subtitle">Gold Dashboard</p>

    <!-- DASHBOARD -->
    <div class="dashboard">
      <div class="card">Deals: <span id="totalDeals">0</span></div>
      <div class="card">Capital: ₱<span id="totalCapital">0</span></div>
      <div class="card">Profit: ₱<span id="totalProfit">0</span></div>
      <div class="card">Win Rate: <span id="winRate">0</span>%</div>
    </div>

    <!-- INPUT -->
    <div class="form">
      <input type="number" id="goldPrice" placeholder="Gold Price">
      <input type="number" id="weight" placeholder="Weight">
      <input type="number" id="askingPrice" placeholder="Asking Price">

      <select id="purity">
        <option value="0.999">24k</option>
        <option value="0.916">22k</option>
        <option value="0.875">21k</option>
        <option value="0.750">18k</option>
        <option value="0.585">14k</option>
      </select>

      <button id="calcBtn">Calculate</button>
      <button id="saveBtn">Save Deal</button>
    </div>

    <div class="results" id="results"></div>

    <!-- TABLE -->
    <table id="historyTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Gold</th>
          <th>Weight</th>
          <th>PPG</th>
          <th>Rank</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <div class="right-panel">
    <iframe src="https://goldpricez.com/ph/gram"></iframe>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
